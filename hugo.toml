baseURL = 'https://shayne-snap.github.io/'
languageCode = 'en-us'
title = 'Shayne'
theme = 'PaperMod'

[params]
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowBreadCrumbs = true
  hideAuthor = true
  mainSections = ["posts"]

  [params.homeInfoParams]
    Title = "Hi, I'm Shayne"
    Content = "I'm messing with AI and Rust."

  [params.author]
    name = 'Shayne'
    email = 'shayne@example.com'

  [[params.socialIcons]]
    name = "twitter"
    url = "https://x.com/shayne_snape"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/shayne-snap"

[menu]
  [[menu.main]]
    name = 'Posts'
    url = '/posts/'
    weight = 1
  [[menu.main]]
    name = 'About'
    url = '/about/'
    weight = 2
